<script>
  (function() {
    if (!document.getElementById('bftp-fonts')) {
      const link = document.createElement('link');
      link.id = 'bftp-fonts';
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap';
      document.head.appendChild(link);
    }
    const script = document.currentScript;
    const host = document.createElement('div');
    script.parentNode.insertBefore(host, script);
    const shadow = host.attachShadow({ mode: 'open' });
    shadow.innerHTML = `
    <style>
      :host { display: block; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      .card {
        background: #fff; border-radius: 26px; padding: 1.95rem 1.625rem;
        box-shadow: 0 2px 24px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.07);
        display: flex; flex-direction: column; align-items: center; text-align: center;
        gap: 0.975rem; opacity: 0; transform: translateY(28px) scale(0.97);
        transition: opacity 0.55s ease, transform 0.55s ease, box-shadow 0.2s ease;
        position: relative; overflow: hidden; max-width: 338px; width: 100%;
        font-family: 'Nunito Sans', sans-serif;
      }
      .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; border-radius: 26px 26px 0 0; background: #e8a000; }
      .card.visible { opacity: 1; transform: translateY(0) scale(1); }
      .card:hover { box-shadow: 0 8px 40px rgba(0,0,0,0.12); transform: translateY(-3px) scale(1) !important; }
      .label { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.885rem; text-transform: uppercase; letter-spacing: 0.13em; padding: 0.36em 1.17em; border-radius: 100px; background: #fdf0d5; color: #c07a00; }
      .desc { font-size: 1.04rem; line-height: 1.65; color: #6b7a99; max-width: 18ch; font-family: 'Nunito Sans', sans-serif; }
      .inner { display: flex; align-items: center; gap: 1.625rem; flex-wrap: wrap; justify-content: center; width: 100%; }
      .big-num { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 3.64rem; letter-spacing: -0.04em; color: #e8a000; line-height: 1; }
      .bar-chart { width: 100%; display: flex; flex-direction: column; gap: 9px; }
      .bar-row { display: flex; align-items: center; gap: 10px; }
      .bar-icon { font-size: 1.17rem; flex-shrink: 0; width: 26px; text-align: center; }
      .bar-track { flex: 1; height: 13px; background: #fdf0d5; border-radius: 100px; overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 100px; background: #e8a000; width: 0%; transition: width 1.2s cubic-bezier(0.22,1,0.36,1); }
    </style>
    <div class="card">
      <span class="label" id="label"></span>
      <div class="inner">
        <div class="big-num" id="bigNum"></div>
        <div class="bar-chart" id="barChart"></div>
      </div>
      <p class="desc" id="desc"></p>
    </div>`;
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcBcWZLvNWGewjyn4J6kC4KP6MxYgrtxjH-pkT14239zIgg-5T9j2oL5ldJbXL8nTexTSI0kNSLuUc/pub?gid=1906984062&single=true&output=csv';
    const DEFAULTS = { card4_label:'Elevate Programme', card4_desc:'schools, colleges, and universities participate in the Elevate Programme', card4_number:'14', card4_suffix:'' };
    const BAR_TYPES  = ['🏫','🎓','🏛️','🎓','🏫','🏛️','🎓'];
    const BAR_WIDTHS = [100,86,72,64,50,43,36];
    const card = shadow.querySelector('.card');
    const labelEl = shadow.getElementById('label');
    const descEl = shadow.getElementById('desc');
    const bigNumEl = shadow.getElementById('bigNum');
    const barChart = shadow.getElementById('barChart');
    let sheetData = {...DEFAULTS}, animated = false;
    function parseCSVRow(line) { const r=[]; let c='', q=false; for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else{q=!q;}}else if(ch===','&&!q){r.push(c);c='';}else{c+=ch;}}r.push(c);return r; }
    function parseCSV(text) { const lines=text.trim().split(/\r?\n/);if(lines.length<3)return{};const data={};for(let i=3;i<lines.length;i++){const row=parseCSVRow(lines[i]);if(row.every(v=>!v.trim()))continue;const k=row[0]?row[0].trim():'';const v=row[1]?row[1].trim():'';if(k)data[k]=v;}return data; }
    function applyAndAnimate() {
      labelEl.textContent=sheetData.card4_label||''; descEl.textContent=sheetData.card4_desc||'';
      bigNumEl.textContent=sheetData.card4_number||'0';
      barChart.innerHTML='';
      BAR_TYPES.forEach((icon,i)=>{
        const row=document.createElement('div'); row.className='bar-row';
        row.innerHTML=`<span class="bar-icon">${icon}</span><div class="bar-track"><div class="bar-fill" data-w="${BAR_WIDTHS[i]}"></div></div>`;
        barChart.appendChild(row);
      });
      card.classList.add('visible');
      setTimeout(()=>{shadow.querySelectorAll('.bar-fill').forEach((bar,i)=>{setTimeout(()=>{bar.style.width=bar.dataset.w+'%';},i*100);});},600);
    }
    async function fetchAndRender() { try{const res=await fetch(SHEET_CSV_URL);if(!res.ok)throw new Error();sheetData={...DEFAULTS,...parseCSV(await res.text())};}catch(e){} applyAndAnimate(); }
    const obs=new IntersectionObserver(entries=>{if(entries[0].isIntersecting&&!animated){animated=true;obs.disconnect();fetchAndRender();}},{threshold:0.2});
    obs.observe(host);
  })();
</script>
