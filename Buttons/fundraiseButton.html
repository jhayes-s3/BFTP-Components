<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundraise Button</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --pink:   #e4007c;
            --cyan:   #00b5d8;
            --purple: #7b2fbe;
            --amber:  #e8a000;
            --navy:   #0d1b2e;
            --white:  #ffffff;
            --text:   #1a1a2e;
            --muted:  #6b7a99;
            --border: rgba(0,0,0,0.07);
        }

        body {
            background: transparent;
            font-family: 'Nunito Sans', sans-serif;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .btn-card {
            background: var(--white);
            border-radius: 20px;
            padding: 1.5rem 1.75rem;
            box-shadow: 0 2px 24px rgba(0,0,0,0.07), 0 0 0 1px var(--border);
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 1rem;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px) scale(0.97);
            animation: cardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
        }

        .btn-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            border-radius: 20px 20px 0 0;
            background: var(--pink);
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .btn-eyebrow {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            padding: 0.28em 0.9em;
            border-radius: 100px;
            background: #fce4f1;
            color: var(--pink);
        }

        .btn-heading {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            letter-spacing: -0.02em;
            color: var(--navy);
            line-height: 1.2;
        }

        .btn-heading em {
            font-style: normal;
            background: linear-gradient(135deg, var(--pink), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-desc {
            font-size: 0.75rem;
            line-height: 1.6;
            color: var(--muted);
            max-width: 22ch;
        }

        .gh-btn-link {
            display: block;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(228,0,124,0.15);
            transition: box-shadow 0.25s ease, transform 0.25s ease;
            line-height: 0;
        }

        .gh-btn-link:hover {
            box-shadow: 0 6px 28px rgba(228,0,124,0.28);
            transform: translateY(-2px);
        }

        .gh-btn-link img {
            width: 200px;
            height: 70px;
            display: block;
        }
    </style>
</head>
